<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元氣食堂 - 便當訂購系統</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-orange: #FF9F1C;
            --deep-orange: #E76F51;
            --bg-light: #FDFCF0;
            --card-bg: #FFFFFF;
        }

        body {  
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-light); 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%; max-width: 1100px;
            display: flex; gap: 20px; align-items: flex-start;
        }

        .header-area {
            width: 95%; max-width: 1100px; margin: 20px 0;
            text-align: center;
        }

        .header-area h1 {
            color: var(--deep-orange);
            margin: 0;
            font-size: clamp(1.2rem, 5vw, 2.2rem) !important;
            line-height: 1.3;
        }

        .menu-container { 
            flex: 2; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px;    
        }

        .item-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 240px; 
        }

        .item-name { 
            font-weight: 900; 
            font-size: clamp(0.9rem, 3.5vw, 1.3rem); 
            color: #222;
            line-height: 1.3;
            margin-bottom: 10px;
            min-height: 2.8em; 
            word-break: break-word;
        }

        .item-price { 
            color: var(--deep-orange); font-weight: 800; 
            font-size: clamp(1.2rem, 4vw, 1.8rem); 
            margin-bottom: 12px; 
        }

        .input-group { display: flex; gap: 8px; justify-content: center; align-items: center; }
        .qty-input { width: 50px; height: 38px; text-align: center; border: 2px solid #EEE; border-radius: 8px; font-size: 1.2rem; }
        .add-btn { 
            background-color: var(--primary-orange); color: white; border: none; 
            padding: 10px 18px; border-radius: 12px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #cc7e0e; position: relative;
        }
        .add-btn:active { top: 4px; box-shadow: 0 0 0; }

        .sidebar { 
            flex: 1; background: white; border-radius: 20px; padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); min-width: 300px;
            border-top: 8px solid var(--primary-orange); box-sizing: border-box;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; align-items: center; }
            .menu-container { width: 100%; }
            .sidebar { width: 100%; min-width: 0; margin-top: 20px; }
        }
    </style>
</head>
<body>

    <div class="header-area">
        <h1>🍱 KITA元氣食堂 - 便當訂購系統</h1>
    </div>

    <div class="container">
        <div class="menu-container" id="menu"></div>

        <div class="sidebar">
            <div style="display: flex; justify-content: space-between; align-items: center; font-size: 1.3em; font-weight: bold; border-bottom: 2px dashed #DDD; padding-bottom: 10px; margin-bottom: 15px;">
                <span>🍱 我的點餐內容</span>
                <span id="current-date" style="font-family: Arial, sans-serif !important; font-weight: 900 !important; color: #000 !important; font-size: 0.85em !important;"></span>
            </div>

            <ul id="cart-list" style="list-style: none; padding: 0; margin-bottom: 15px;"><li>尚無選餐...</li></ul>
            <div style="text-align: right; color: var(--deep-orange); font-size: 1.8em; font-weight: 900; margin: 15px 0;">總計: $<span id="total-amount">0</span></div>
            
            <div style="margin-bottom: 15px;">
                <label style="font-weight:bold; color:#666; display:block; margin-bottom:5px;">員工工號</label>
                <input type="text" id="emp-id" 
                style="width:100%; padding:15px; font-size:1.4em; border:2px solid #EEE; border-radius:10px; box-sizing:border-box;" 
                placeholder="請輸入工號 số nhân viên">
            </div>
            <button onclick="submitOrder()" style="background:var(--primary-orange); color:white; width:100%; padding:15px; border:none; border-radius:12px; font-size:1.3em; font-weight:bold; cursor:pointer; box-shadow:0 4px 0 #cc7e0e;">送出訂單</button>
        </div>
    </div> 

<script>
    const items = [
        { name: "隨機精選便當 hộp cơm trưa", price: 80 },
        { name: "白飯 Cơm trắng", price: 10 }
    ];
    let cart = [];

    window.onload = function() {
        // 顯示今日日期
        const dateEl = document.getElementById('current-date');
        if (dateEl) {
            const today = new Date();
            dateEl.innerText = `今日：${today.getFullYear()}/${today.getMonth() + 1}/${today.getDate()}`;
        }
        
        // 自動填入工號
        const savedId = localStorage.getItem('savedEmpId');
        if (savedId) {
            const empInput = document.getElementById('emp-id');
            if (empInput) empInput.value = savedId;
        }

        renderMenu();
    };

    function renderMenu() {
        const menuEl = document.getElementById('menu');
        if (!menuEl) return;
        menuEl.innerHTML = items.map((item, index) => `
            <div class="item-card">
                <div>
                    <div class="item-name">${item.name.replace(' ', '<br>')}</div>
                    <div class="item-price">$${item.price}</div>
                </div>
                <div class="input-group">
                    <input type="number" id="qty-${index}" class="qty-input" value="1" min="1">
                    <button class="add-btn" onclick="addToCart(${index})">加入</button>
                </div>
            </div>`).join('');
    }

    function addToCart(index) {
        const qtyInput = document.getElementById(`qty-${index}`);
        const qty = qtyInput ? parseInt(qtyInput.value) : 1;
        const item = items[index];
        const existing = cart.find(c => c.name === item.name);
        if (existing) { existing.qty += qty; } else { cart.push({ ...item, qty }); }
        renderCart();
        if (qtyInput) qtyInput.value = 1;
    }

    function renderCart() {
        const listEl = document.getElementById('cart-list');
        const totalEl = document.getElementById('total-amount');
        if (!listEl) return;
        if (cart.length === 0) {
            listEl.innerHTML = '<li>尚無選餐...</li>';
            if (totalEl) totalEl.innerText = '0';
            return;
        }
        listEl.innerHTML = cart.map((item, index) => `
            <li style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f9f9;">
                <span><strong>${item.name}</strong> x ${item.qty}</span>
                <button onclick="removeFromCart(${index})" style="background:#ffeded; border:none; color:#d9534f; width:28px; height:28px; border-radius:50%; cursor:pointer;">✕</button>
            </li>`).join('');
        if (totalEl) totalEl.innerText = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
    }

    function submitOrder() {
        const empInput = document.getElementById('emp-id');
        const empIdValue = empInput ? empInput.value.trim() : "";
        const totalAmount = document.getElementById('total-amount').innerText;

        if (!empIdValue) return Swal.fire('提示', '請先輸入工號喔！', 'warning');
        if (cart.length === 0) return Swal.fire('提示', '您的購物車還是空的！', 'warning');

        // 3. 整理訂單摘要
        const orderSummary = cart.map(item => `${item.name.replace('\n', ' ')}x${item.qty}`).join(', ');

        // 4. 先執行成功提示與清空，增加使用者體驗
        showSuccess(empIdValue);

        // 5. 背景傳送資料給 Google
        fetch('https://script.google.com/macros/s/AKfycbzFuSEGH1LZLHGGYMMakVR9FIMoeO7av3Gm1wLRAzCDc6VSCppBUdUgZ4UCWER5zne1_Q/exec', {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ empId: empIdValue, orderItems: orderSummary, totalPrice: totalAmount })
        });
    }

    function showSuccess(empIdValue) {
        const now = new Date();
        const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        
        Swal.fire({
            title: 'KITA 元氣食堂',
            html: `🎉 <b>訂購完成！</b><br>工號：${empIdValue}<br>時間：${timeString}<br>✅ 訂單已記錄至後台。`,
            icon: 'success',
            confirmButtonColor: '#ff9800'
        });

        localStorage.setItem('savedEmpId', empIdValue);
        cart = [];
        renderCart();
    }
</script>
</body>
</html>
